version: "3.8"

services:
  # 1. The Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672" # Standard AMQP port
      - "15672:15672" # Management UI (Dashboard)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Server A (The Physical World)
  server_a:
    build: .
    command: python -m grcp_server.server_a
    ports:
      - "50051:50051" # Expose the gRPC port
    depends_on:
      rabbitmq:
        condition: service_healthy # Wait for RabbitMQ to wake up before starting
