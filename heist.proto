syntax = "proto3";

service HeistGame {
  // ---------------------------------------------------------
  // HACKER ACTIONS (Called from Server B, executed on Server A)
  // ---------------------------------------------------------
  rpc unlockDoor (TargetRequest) returns (ActionResponse) {}
  rpc disableCamera (TargetRequest) returns (ActionResponse) {}
  rpc disableLaser (TargetRequest) returns (ActionResponse) {}

  // ---------------------------------------------------------
  // INFILTRATOR ACTIONS (Called from Server A, executed on Server B)
  // ---------------------------------------------------------
  // Infiltrator plugs in USB to give Hacker access to the next zone
  rpc grantNetworkAccess (AccessRequest) returns (ActionResponse) {}

  // ---------------------------------------------------------
  // DISTRIBUTED ALGORITHMS (The Maekawa Vault Download)
  // ---------------------------------------------------------
  rpc requestVote (VoteRequest) returns (VoteResponse) {}
}

// --- Reusable Data Payloads ---

message TargetRequest {
  string target_id = 1; // Can be "door_01", "camera_02", or "laser_01"
  string hacker_id = 2;
}

message AccessRequest {
  string access_point_id = 1; // e.g., "level_2_router"
  string hacker_id = 2;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

// Data for the Maekawa mutual exclusion algorithm
message VoteRequest {
  string requesting_node_id = 1;
  int64 timestamp = 2; 
}

message VoteResponse {
  bool vote_granted = 1;
}