syntax = "proto3";

service HeistGame {
  // ---------------------------------------------------------
  // SESSION MANAGEMENT (Matchmaking & Lobbies)
  // ---------------------------------------------------------
  rpc createLobby (CreateLobbyRequest) returns (LobbyResponse) {}
  rpc joinLobby (JoinLobbyRequest) returns (LobbyResponse) {}

  // ---------------------------------------------------------
  // HACKER ACTIONS (Called from Server B, executed on Server A)
  // ---------------------------------------------------------
  rpc unlockDoor (TargetRequest) returns (ActionResponse) {}
  rpc disableCamera (TargetRequest) returns (ActionResponse) {}
  rpc disableLaser (TargetRequest) returns (ActionResponse) {}

  // ---------------------------------------------------------
  // INFILTRATOR ACTIONS (Called from Server A, executed on Server B)
  // ---------------------------------------------------------
  // Infiltrator plugs in USB to give Hacker access to the next zone
  rpc grantNetworkAccess (AccessRequest) returns (ActionResponse) {}

  // ---------------------------------------------------------
  // DISTRIBUTED ALGORITHMS (The Maekawa Vault Download)
  // ---------------------------------------------------------
  rpc requestVote (VoteRequest) returns (VoteResponse) {}
}

// --- Session Management Payloads ---

message CreateLobbyRequest {
  string player_id = 1; // The name/ID of the player hosting the game
}

message JoinLobbyRequest {
  string lobby_code = 1; // The 4-digit code (e.g., "A7X9")
  string player_id = 2;  // The name/ID of the player joining
}

message LobbyResponse {
  bool success = 1;
  string message = 2;
  string lobby_code = 3; // The code generated by the server, or the one joined
  string assigned_role = 4; // The server tells the client if they are "Infiltrator" or "Hacker"
}

// --- Reusable Data Payloads ---

message TargetRequest {
  string target_id = 1; // Can be "door_01", "camera_02", or "laser_01"
  string hacker_id = 2;
  string lobby_code = 3; // NEW: We must know WHICH lobby this hack belongs to!
}

message AccessRequest {
  string access_point_id = 1; // e.g., "level_2_router"
  string hacker_id = 2;
  string lobby_code = 3; // NEW: We must know WHICH lobby this hack belongs to!
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

// Data for the Maekawa mutual exclusion algorithm
message VoteRequest {
  string requesting_node_id = 1;
  int64 timestamp = 2; 
}

message VoteResponse {
  bool vote_granted = 1;
}